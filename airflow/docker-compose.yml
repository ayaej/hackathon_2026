x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.5
  environment:
    &airflow-common-env

    # LocalExecutor   : le scheduler execute les taches directement, sans worker externe
    # CeleryExecutor  : le scheduler utilise un pool de workers (Redis)
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    # connexion a la base Postgres qui stocke l'etat des DAGs et des runs
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    # ne charge pas les DAGs d'exemple fournis par Airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    # un nouveau DAG sera en pause par defaut, on l'active manuellement
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    # Active l'authentification basique pour l'API REST Airflow
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session

    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
  volumes:
    # DAGs Python monté en live (pas besoin de rebuild)
    - ./dags:/opt/airflow/dags

    # logs des tâches
    - ./logs:/opt/airflow/logs

    # plugins Airflow
    - ./plugins:/opt/airflow/plugins

    # fichiers de config Airflow supplementaires
    - ./config:/opt/airflow/config

    # dossier de simulation locale via les taches mock
    - ../simu:/opt/airflow/simu


  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # BDD Airflow : DAGs, runs, logs metadonnees, XCom
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # Airflow init : migrate la base et créé le compte admin (executé une seule fois)
  # TODO: faire un login plus secure pour la prod
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --firstname Matis --lastname Admin --role Admin --email admin@example.com --password admin
    restart: "no"

  # interface web Airflow : http://localhost:8080 (admin-admin)
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # scheduler : detecte les DAG + planifie et execute les taches (LocalExecutor)
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

# vol persistant pour la base Postgres (docker compose down --volumes pour delete)
volumes:
  postgres-db-volume:
