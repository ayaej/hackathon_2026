# Configuration de base pour Gemini Code Assist

# Langage principal de ton projet
language: python

# Mode d'assistance de Gemini
# options possibles : suggestions (propose du code), corrections (corrige le code existant)
assist_mode: suggestions

# Active Gemini pour ce repo
enabled: true

# Dossiers/fichiers à inclure ou exclure (optionnel)
include:
  - src/**
  - notebooks/**
exclude:
  - data/**
  - .venv/**