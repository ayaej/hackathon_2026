version: '3.8'

services:
  # MongoDB - Base de données NoSQL
  mongodb:
    image: mongo:7.0
    container_name: datalake-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: document_processing_datalake
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - datalake-network

  # MinIO - Stockage S3-compatible pour fichiers bruts
  minio:
    image: minio/minio:latest
    container_name: datalake-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - datalake-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Client - Initialisation des buckets
  minio-init:
    image: minio/mc:latest
    container_name: datalake-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/raw-zone;
      /usr/bin/mc mb --ignore-existing myminio/clean-zone;
      /usr/bin/mc mb --ignore-existing myminio/curated-zone;
      /usr/bin/mc policy set download myminio/raw-zone;
      /usr/bin/mc policy set download myminio/clean-zone;
      /usr/bin/mc policy set download myminio/curated-zone;
      echo 'Buckets créés avec succès';
      exit 0;
      "
    networks:
      - datalake-network

networks:
  datalake-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  minio_data:
    driver: local
